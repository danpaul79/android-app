name: Feedback Processor

on:
  # Automatic trigger disabled — feedback issues are reviewed locally first
  # To re-enable: uncomment the issues trigger below
  # issues:
  #   types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process (leave empty for oldest open feedback issue)'
        required: false

concurrency:
  group: feedback-processor
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  process-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine issue to process
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          if [ -n "$INPUT_ISSUE_NUMBER" ]; then
            ISSUE=$(gh issue view "$INPUT_ISSUE_NUMBER" --json number,title,body)
            echo "found=true" >> $GITHUB_OUTPUT
            echo "number=$(echo "$ISSUE" | jq -r '.number')" >> $GITHUB_OUTPUT
            echo "title=$(echo "$ISSUE" | jq -r '.title')" >> $GITHUB_OUTPUT
            echo "$ISSUE" | jq -r '.body' > /tmp/issue_body.txt
          else
            # No issue number — find oldest open feedback issue
            ISSUE=$(gh issue list --label feedback --state open --json number,title,body --limit 1 --jq '.[0]')
            if [ "$ISSUE" = "" ] || [ "$ISSUE" = "null" ]; then
              echo "No open feedback issues found"
              echo "found=false" >> $GITHUB_OUTPUT
            else
              echo "found=true" >> $GITHUB_OUTPUT
              echo "number=$(echo "$ISSUE" | jq -r '.number')" >> $GITHUB_OUTPUT
              echo "title=$(echo "$ISSUE" | jq -r '.title')" >> $GITHUB_OUTPUT
              echo "$ISSUE" | jq -r '.body' > /tmp/issue_body.txt
            fi
          fi

      - name: Process feedback with Claude
        if: steps.find-issue.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A user submitted feedback via the in-app feedback form. Read the issue below and implement the requested change.

            **Issue #${{ steps.find-issue.outputs.number }}**
            **Title**: ${{ steps.find-issue.outputs.title }}
            **Body**:
            $(cat /tmp/issue_body.txt)

            Instructions:
            1. Read CLAUDE.md for project context and architecture
            2. Explore the codebase to understand the relevant code
            3. Implement the change (bug fix or feature request)
            4. Make sure the code compiles: run `JAVA_HOME="/usr/lib/jvm/temurin-17-jdk-amd64" ./gradlew :app:compileDebugKotlin`
            5. Create a branch named `feedback/${{ steps.find-issue.outputs.number }}`
            6. Commit your changes
            7. Create a PR with "Closes #${{ steps.find-issue.outputs.number }}" in the body

      - name: Auto-merge feedback PR
        if: steps.find-issue.outputs.found == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GH_ISSUES_PAT }}
        run: |
          # Find the PR created by Claude for this feedback issue
          PR_NUMBER=$(gh pr list --search "Closes #${{ steps.find-issue.outputs.number }}" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ] && [ "$PR_NUMBER" != "" ]; then
            echo "Merging PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --merge --delete-branch
          else
            echo "No PR found for issue #${{ steps.find-issue.outputs.number }}"
          fi

      - name: Comment on issue if processing failed
        if: steps.find-issue.outputs.found == 'true' && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.find-issue.outputs.number }} \
            --body "Automated processing attempted but encountered an error. Manual review needed."
